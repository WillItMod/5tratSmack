name: Hardware compatibility report
description: Submit a redacted miner API discovery report
title: "[Hardware] "
labels:
  - hardware
body:
  - type: markdown
    attributes:
      value: |
        Do not include wallet secrets, passwords, recovery words, public IP addresses or authentication tokens.
  - type: input
    id: vendor
    attributes:
      label: Manufacturer
      placeholder: Canaan, Bitaxe, NerdQaxe…
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: 5tratSmack host architecture
      options:
        - linux/amd64
        - linux/arm64
        - Unknown
    validations:
      required: true
  - type: textarea
    id: report
    attributes:
      label: Redacted discovery report
      description: Paste the report generated by 5tratSmack after reviewing it.
      render: json
    validations:
      required: true
